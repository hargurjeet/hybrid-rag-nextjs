name: Sync to Hugging Face hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "gurjeet333@gmail.com"
          git config --global user.name "hargurjeet"

          # Inject HF Space metadata into README before pushing
          cp README-hf.md README.md
          git add README.md
          git diff --staged --quiet || git commit -m "chore: set HF Space README metadata"

          git remote add hf https://Hargurjeet:${HF_TOKEN}@huggingface.co/spaces/Hargurjeet/hybrid-rag-nextjs
          git push hf main --force
