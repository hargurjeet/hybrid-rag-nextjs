name: Sync to Hugging Face hub

on:
  push:
    branches: [main] # Triggers on push to the main branch
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true # Important for handling large files (>10MB)
      
      - name: Sync with Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git
          git config --global user.email "gurjeet333@gmail.com"
          git config --global user.name "hargurjeet"
          
          # Add Hugging Face as remote
          git remote add hf https://Hargurjeet:${HF_TOKEN}@huggingface.co/spaces/Hargurjeet/hybrid_rag_hf
          
          # Fetch the remote files
          git fetch hf
          
          # Merge the remote files with local files (allow unrelated histories)
          git merge hf/main --allow-unrelated-histories --no-edit
          
          # Push the merged result back
          git push hf main